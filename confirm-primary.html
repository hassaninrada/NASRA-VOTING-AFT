<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Review — Primary Wing</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #E3F2FD;
      font-family: 'Outfit', sans-serif;
    }

    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(187,222,251,0.5);
      box-shadow: 0 20px 40px -10px rgba(13,71,161,0.1);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-2xl">

    <div class="glass-card rounded-[3rem] p-10">

      <!-- Header -->
      <div class="text-center mb-10">
        <i class="fa-solid fa-clipboard-check text-blue-600 text-4xl"></i>
        <h1 class="text-3xl font-black text-blue-900 mt-4">Review Your Ballot</h1>
        <p class="text-blue-400 text-xs uppercase tracking-widest">Primary Wing E-Election Hub</p>
      </div>

      <!-- GRID (NOW 4 POSITIONS) -->
      <div class="grid grid-cols-2 gap-4 mb-10">

        <!-- Head Boy -->
        <div class="bg-white/60 p-6 rounded-2xl border-2 border-blue-100">
          <p class="text-xs font-black text-blue-400 uppercase">Wing Head Boy</p>
          <p id="hb" class="text-xl font-black text-blue-900">Loading...</p>
        </div>

        <!-- Head Girl -->
        <div class="bg-white/60 p-6 rounded-2xl border-2 border-blue-100">
          <p class="text-xs font-black text-blue-400 uppercase">Wing Head Girl</p>
          <p id="hg" class="text-xl font-black text-blue-900">Loading...</p>
        </div>

        <!-- Deputy Head Boy -->
        <div class="bg-white/60 p-6 rounded-2xl border-2 border-blue-100">
          <p class="text-xs font-black text-blue-400 uppercase">Deputy Wing Head Boy</p>
          <p id="dhb" class="text-xl font-black text-blue-900">Loading...</p>
        </div>

        <!-- Deputy Head Girl -->
        <div class="bg-white/60 p-6 rounded-2xl border-2 border-blue-100">
          <p class="text-xs font-black text-blue-400 uppercase">Deputy Wing Head Girl</p>
          <p id="dhg" class="text-xl font-black text-blue-900">Loading...</p>
        </div>

      </div>

      <!-- Buttons -->
      <button id="finalBtn"
        class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mb-3">
        Finalize Decisions
      </button>

      <button id="restartBtn"
        class="w-full bg-white border-2 border-blue-100 text-blue-500 font-black py-3 rounded-2xl">
        Discard & Restart
      </button>

      <!-- Session -->
      <p class="text-center mt-8 text-xs text-blue-300 font-bold">
        Session ID: <span id="sessId">#000000</span>
      </p>

    </div>

  </div>

  <!-- Loader -->
  <div id="loader"
    class="fixed inset-0 bg-white hidden items-center justify-center flex-col">
    <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-blue-900">Processing Vote...</p>
  </div>

  <!-- Toast -->
  <div id="toast"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-red-500 text-white rounded-xl hidden">
  </div>

  <script type="module" src="confirm-primary.js"></script>

</body>
</html>
